<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Primera Nota</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { height: 100dvh; overflow: hidden; }

    .player-layout {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 16px 20px 24px;
      max-width: 480px;
      margin: 0 auto;
    }

    .player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .my-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-light);
    }

    .room-tag {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: monospace;
      background: var(--surface);
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
    }

    .scoreboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin: 12px 0;
      flex-shrink: 0;
    }

    .scoreboard-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .status-area {
      flex-shrink: 0;
      text-align: center;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-pill {
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .status-pill.waiting   { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
    .status-pill.active    { background: rgba(124,58,237,0.2); color: var(--accent-light); border: 1px solid var(--accent); }
    .status-pill.queued    { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid #60a5fa55; }
    .status-pill.my-turn   { background: rgba(16,185,129,0.2); color: var(--success); border: 1px solid var(--success); font-size: 1.1rem; }
    .status-pill.failed    { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid var(--danger); }
    .status-pill.won       { background: rgba(16,185,129,0.2); color: var(--success); border: 1px solid var(--success); }

    .buzz-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="player-layout">

    <!-- Header -->
    <div class="player-header">
      <span class="my-name" id="my-name-display">—</span>
      <span class="room-tag" id="room-tag-display">----</span>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="scoreboard-title">Puntajes</div>
      <ul class="player-list" id="player-list" style="gap: 6px;">
        <li class="text-muted" style="list-style:none; padding: 4px 0;">Esperando jugadores...</li>
      </ul>
    </div>

    <!-- Estado actual -->
    <div class="status-area">
      <span class="status-pill waiting" id="status-pill">Esperando que el host inicie...</span>
    </div>

    <!-- BUZZER -->
    <div class="buzz-area">
      <button class="buzz-btn" id="buzz-btn" disabled onclick="pressBuzz()">
        BUZZ
      </button>
    </div>

  </div>

  <div id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── Estado local ──
    let myId = null;
    let buzzEnabled = false;
    let players = [];

    // ESTADOS posibles del jugador en la ronda:
    // 'idle'       → ronda no iniciada
    // 'ready'      → puede presionar
    // 'my-turn'    → es mi turno de adivinar
    // 'queued'     → presioné, esperando mi turno
    // 'failed'     → presioné y fallé esta ronda
    // 'locked'     → alguien está adivinando, yo no presioné aún (pero puedo)

    const playerName = sessionStorage.getItem('pn_player_name');
    const roomCode   = sessionStorage.getItem('pn_room_code');

    if (!playerName || !roomCode) window.location.href = '/';

    document.getElementById('my-name-display').textContent = playerName;
    document.getElementById('room-tag-display').textContent = 'Sala: ' + roomCode;

    const socket = io();

    socket.on('connect', () => {
      myId = socket.id;
      socket.emit('join-room', { code: roomCode, playerName });
    });

    socket.on('joined-room', ({ players: p }) => {
      players = p;
      renderPlayers();
      setStatus('waiting', 'Esperando que el host inicie...');
    });

    socket.on('join-error', ({ message }) => {
      showToast(message, 4000);
      setTimeout(() => window.location.href = '/', 3000);
    });

    socket.on('players-update', ({ players: p }) => {
      players = p;
      renderPlayers();
    });

    socket.on('round-started', () => {
      setBuzzEnabled(true);
      setBuzzGlow(false);
      setStatus('active', '🎵 ¡Escuchá la canción!');
    });

    socket.on('buzz-stop', ({ guesserId, guesserName, queue }) => {
      if (guesserId === myId) {
        setBuzzEnabled(false);
        setBuzzGlow(true);
        setStatus('my-turn', '🎤 ¡Tu turno! Di la canción');
      } else {
        // Si ya presioné → mantener deshabilitado (el evento 'queued' muestra la posición)
        // Si NO presioné → el botón sigue activo, puedo presionar y entrar a la cola
        if (alreadyBuzzed) {
          setBuzzEnabled(false);
        }
        setStatus('active', `Adivinando: ${esc(guesserName)} — ¿sabes cuál es?`);
      }
    });

    socket.on('queued', ({ position }) => {
      setBuzzEnabled(false);
      setBuzzGlow(false);
      setStatus('queued', `En cola — posición #${position}`);
    });

    socket.on('queue-empty', () => {
      // La cola se vació. Si no presioné aún, puedo seguir.
      // Si ya fallé, sigo sin poder presionar.
      const myPlayer = players.find(p => p.id === myId);
      // No tenemos info de si fallé. Necesitamos rastrearlo localmente.
      if (!alreadyBuzzed) {
        setBuzzEnabled(true);
        setStatus('active', '🎵 ¡Seguí escuchando!');
      } else {
        setStatus('failed', 'Fallaste — escuchá cómo termina');
      }
    });

    socket.on('round-won', ({ winnerName }) => {
      setBuzzEnabled(false);
      setBuzzGlow(false);
      if (winnerName === playerName) {
        setStatus('won', '🏆 ¡Adivinaste!');
      } else {
        setStatus('waiting', `🏆 ${esc(winnerName)} adivinó`);
      }
    });

    socket.on('round-reset', () => {
      alreadyBuzzed = false;
      setBuzzEnabled(false);
      setBuzzGlow(false);
      setStatus('waiting', 'Esperando la próxima ronda...');
    });

    socket.on('room-closed', ({ message }) => {
      showToast(message, 4000);
      setTimeout(() => window.location.href = '/', 3500);
    });

    // ── Variable local: ¿ya presioné en esta ronda? ──
    let alreadyBuzzed = false;

    function pressBuzz() {
      if (!buzzEnabled) return;
      alreadyBuzzed = true;
      setBuzzEnabled(false);
      socket.emit('buzz');
    }

    function setBuzzEnabled(enabled) {
      buzzEnabled = enabled;
      document.getElementById('buzz-btn').disabled = !enabled;
    }

    function setBuzzGlow(on) {
      const btn = document.getElementById('buzz-btn');
      if (on) btn.classList.add('winner-glow');
      else     btn.classList.remove('winner-glow');
    }

    // ── Render ──
    function renderPlayers() {
      const list = document.getElementById('player-list');

      if (players.length === 0) {
        list.innerHTML = '<li class="text-muted" style="list-style:none;padding:4px 0;">Sin jugadores</li>';
        return;
      }

      const sorted = [...players].sort((a, b) => b.score - a.score);
      list.innerHTML = sorted.map(p => {
        const scoreClass = p.score > 0 ? 'positive' : p.score < 0 ? 'negative' : '';
        const isMe = p.id === myId;
        return `
          <li class="player-item" style="${isMe ? 'border-color:var(--accent);' : ''}">
            <span class="player-name">${esc(p.name)}${isMe ? ' (tú)' : ''}</span>
            <span class="player-score ${scoreClass}">${p.score > 0 ? '+' : ''}${p.score}</span>
          </li>`;
      }).join('');
    }

    function setStatus(type, text) {
      const el = document.getElementById('status-pill');
      el.className = 'status-pill ' + type;
      el.textContent = text;
    }

    function showToast(msg, duration = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }

    function esc(str) {
      return str.replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
